name: Welcome New Contributors

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: >
            Thanks for opening your first issue! We'll take a look soon.
            If this is a bug, make sure you've included steps to reproduce.
            If this is a broker support request, the column headers and sample rows
            help us build the parser much faster.
          pr-message: >
            Thanks for your first PR! We appreciate you contributing to Hisaab.
            A maintainer will review this soon. In the meantime, please make sure
            `npx tsc --noEmit` and `npm run build` pass, and that you've filled
            out the PR checklist.
