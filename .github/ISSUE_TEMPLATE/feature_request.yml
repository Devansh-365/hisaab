name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Before submitting
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the frustration or pain point. Focus on the problem, not the solution.
      placeholder: I'm frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How you'd like it to work. Include mockups or sketches if helpful.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about and why they won't work as well.

  - type: dropdown
    id: area
    attributes:
      label: Area of the app
      description: Which part of Hisaab does this affect?
      multiple: true
      options:
        - Dashboard / P&L
        - Journal
        - Calendar
        - Analytics
        - Tax Reports
        - Upload / Parsing
        - Export
        - Mobile experience
        - PWA / Offline
        - Other

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, examples, links, or anything else.
